services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hrms-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:-Loghaz/3612}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
      - ./Database/Scripts:/scripts:ro
      - ./Database/Backups:/backups
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  hrms.api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: Release
    image: hrms.api:latest
    container_name: hrms-api
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:5000
      HttpPort: "5000"
      ConnectionStrings__HRMSConnection: ${HRMS_CONNECTION:-Server=sqlserver;Database=CoreHR;User Id=sa;Password=${SA_PASSWORD:-Loghaz/3612};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true}
      JWT__Key: ${JWT_KEY:-gjkfgjfkgjf458949584954$%_#)@#_@)#_@)#4}
      JWT__JWTIssuer: ${JWT_ISSUER:-http://localhost:5000}
      JWT__Audience: ${JWT_AUDIENCE:-http://localhost:4201}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN0:-http://localhost:4200}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN1:-http://localhost:4201}
      KeepAlive__BaseUrl: ${KEEPALIVE_BASEURL:-http://localhost:5000}
    volumes:
      - ./HRMS.API/wwwroot:/app/wwwroot
      - ./logs:/app/logs
      - ./HRMS.API/InsuranceTemp:/app/InsuranceTemp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/swagger/index.html || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  hrms.dashboard:
    build:
      context: ./FrontEnd/Dashboard
      dockerfile: Dockerfile
    image: hrms.dashboard:latest
    container_name: hrms-dashboard
    depends_on:
      hrms.api:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-4201}:80"
    environment:
      API_BASE_URL: ${DASHBOARD_API_BASE_URL:-AUTO}
      API_PORT: ${API_PORT:-5000}
      CLIENT_NAME: ${CLIENT_NAME:-مدیران خودرو}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  sql-data:
    name: hrms_sql_data
    driver: local
